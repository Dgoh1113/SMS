; ── OPcache production tuning ──────────────────────────────────
; JIT compilation for PHP 8.4 (tracing mode for best perf)
opcache.jit=tracing
opcache.jit_buffer_size=64M

; Don't recheck file timestamps — files won't change in production
; After deploying, run: php artisan optimize
opcache.validate_timestamps=0
opcache.revalidate_freq=0

; Bump interned strings buffer (Laravel uses many string constants)
opcache.interned_strings_buffer=16

; Allow more files to be cached
opcache.max_accelerated_files=20000

; ── Realpath cache ────────────────────────────────────────────
; Reduce stat() calls when resolving file paths
realpath_cache_size=4096K
realpath_cache_ttl=600
